<html>
    <head>
         <style type = "text/css">
            #divid, #divnum, #divemail, #divhome{
                margin : 20px 20px;
                padding: 25px;
                border: 2px solid black;
            }
            #divlogin{
                background-color: gray;
                color: white;
                padding: 10px;
            }
            #divlogin:hover{
                background-color: green;
                color: green;
            }
             #lblid{
                font-size: 18px;
                color : red;
            }
             #lblnum{
                font-size: 16px;
                color : violet;
            }
             #lblemail{
                font-size: 20px;
                color : green;
            }
             #lblhome{
                font-size: 14px;
                color : blue;
            }
         </style>
    </head>

    <body>
        <div id = "divst">
              <label id = "lblst">회원가입을 시작합니다.</label>
              <label id = "lblst">필수정보들을 입력해주세요.</label>
         </div>
        <div id = "divid">
              <label id = "lblid">이름</label>
              <input type="text" id = "userid" placeholder="성을 포함한 3자리를 입력해주세요.">
         </div>
         <div id = "divnum">
              <label id = "lblnum">전화번호</label>
              <input type="text" id = "usernum" placeholder = "010을 포함하여 입력해주세요.">
         </div>
          <div id = "divemail">
              <label id = "lblemail">이메일</label>
              <input type="email" placeholder="이메일을 입력해주세요.">
         </div>
         <div id = "divhome">
              <label id = "lblhome">주소</label>
              <input type="text" id = "userhome" placeholder = "주소를 입력해주세요.">
         </div>
         <div id = "divlogin">
            <button type = "submit" id = "login">회원가입</button>
         </div>
    </body>
</html>
